name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS / Swift 6.2
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      # macos-15 ships with Swift 6.0/6.1; bump to the highest Xcode pre-installed,
      # which on the current runner is Xcode 16 → Swift 6.x. swift-configuration
      # 1.0.x needs Swift 6.2+ stdlib (it uses Data.bytes), so select the newest
      # Xcode that's available.
      - name: Select latest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$latest" ]; then
            echo "::error::No Xcode_*.app found"
            ls /Applications | grep -i xcode || true
            exit 1
          fi
          echo "Selecting $latest"
          sudo xcode-select -s "$latest/Contents/Developer"
      - name: Show toolchain
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test --parallel
      - name: Build with ConfigurationSupport disabled
        run: swift build --disable-default-traits

  linux:
    name: Linux / Swift 6.2
    runs-on: ubuntu-latest
    container: swift:6.3-noble
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: swift --version
      - name: Build
        run: swift build
      # NOTE: TLS integration tests are macOS-only because they use URLSession
      # with a custom delegate. Filter them out on Linux.
      - name: Test (excluding TLSIntegrationTests)
        run: swift test --parallel --skip TLSIntegrationTests
      - name: Build with ConfigurationSupport disabled
        run: swift build --disable-default-traits

  protoc-plugin:
    name: protoc plugin smoke test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      # macos-15 ships with Swift 6.0/6.1; bump to the highest Xcode pre-installed,
      # which on the current runner is Xcode 16 → Swift 6.x. swift-configuration
      # 1.0.x needs Swift 6.2+ stdlib (it uses Data.bytes), so select the newest
      # Xcode that's available.
      - name: Select latest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$latest" ]; then
            echo "::error::No Xcode_*.app found"
            ls /Applications | grep -i xcode || true
            exit 1
          fi
          echo "Selecting $latest"
          sudo xcode-select -s "$latest/Contents/Developer"
      - name: Install buf
        run: brew install bufbuild/buf/buf
      - name: Build plugin
        run: swift build --product protoc-gen-connect-swift-server
      - name: Generate from a sample .proto and compile the result
        run: |
          mkdir -p /tmp/plugin-smoke && cd /tmp/plugin-smoke
          cat > greeter.proto <<'EOF'
          syntax = "proto3";
          package smoke;
          service Greeter {
            rpc SayHello(HelloRequest) returns (HelloReply);
            rpc StreamHellos(HelloRequest) returns (stream HelloReply);
          }
          message HelloRequest { string name = 1; }
          message HelloReply { string message = 1; }
          EOF
          cat > buf.yaml <<'EOF'
          version: v2
          EOF
          cat > buf.gen.yaml <<'EOF'
          version: v2
          plugins:
            - local: ${{ github.workspace }}/.build/debug/protoc-gen-connect-swift-server
              out: gen
          EOF
          buf generate
          # Smoke check: the generated file references the expected types and registration calls.
          test -f gen/greeter.connect.swift
          grep -q "Smoke_GreeterConnectService" gen/greeter.connect.swift
          grep -q "registerUnary" gen/greeter.connect.swift
          grep -q "registerServerStreaming" gen/greeter.connect.swift
